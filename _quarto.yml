project:
  resources:
    - CNAME
  type: website

website:
  title: "Rflow"
  site-url: "https://rflow.co.uk"
  favicon: favicon.svg
  navbar:
    logo: favicon.svg
    logo-alt: "Rflow logo"
    collapse-below: lg
    left:
      - text: "Overview"
        href: index.qmd
      - text: "Docs"
        href: docs/index.qmd
      - text: "Blog"
        href: blog/index.qmd
      - text: "About"
        href: about.qmd
    right:
      - text: "Login"
        href: 404.qmd
      - text: "Start for Free"
        href: 404.qmd

  page-footer:
    center:
      - text: "Rflow and Rflow logo are UK registered trademarks of RSDS Ltd"
      - text: "Terms and Conditions"
        href: terms_and_conditions.qmd
      - text: "Privacy Policy"
        href: privacy_notice.qmd


  sidebar:
    - id: tutorials
      title: "Tutorials"
      style: "docked"
      background: light
      contents:
        - tutorials/

    - id: howto
      title: "How-To"
      contents:
        - howto/

    - id: fundamentals
      title: "Fundamentals"
      contents:
        - fundamentals/

    - id: reference
      title: "Reference"
      contents:
        - reference/index.qmd
        - reference/add-column.qmd
        - reference/barchart.qmd
        - reference/boxplot.qmd
        - reference/density.qmd
        - reference/diagnostics.qmd
        - reference/factor.qmd
        - reference/glm.qmd
        - reference/histogram.qmd
        - reference/input-csv.qmd
        - reference/linear-model.qmd
        - reference/mean-stats.qmd
        - reference/output-csv.qmd
        - reference/predict-lm.qmd
        - reference/residuals.qmd
        - reference/scatterplot.qmd
        - reference/summary-stats.qmd
        - reference/tukey-hsd.qmd

format:
  html:
    theme:
      - cosmo
      - brand
    css: styles.css
    include-after-body:
      - navbar-search-order.html
      - docs-subnav.html
    page-layout: full
    toc: false



